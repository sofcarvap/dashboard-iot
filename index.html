<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GreenTech Solutions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0d3b1e, #16552d);
            min-height: 100vh;
            color: white;
            font-family: "Segoe UI", sans-serif;
        }

        .topo {
            background: rgba(0,0,0,.15);
            border-bottom: 3px solid #7CFC00;
            padding: 20px;
        }

        .titulo {
            color: #9cff57;
            font-weight: bold;
            font-size: 2rem;
        }

        .subtitulo {
            color: #c9e7c9;
        }

        .status-box{
            text-align:right;
        }

        .painel{
            margin-top:40px;
        }

        .card-dashboard{
            background:#173d24;
            border:none;
            border-radius:20px;
            box-shadow:0px 8px 20px rgba(0,0,0,.35);
            color:white;
        }

        .icone{
            font-size:50px;
            margin-bottom:15px;
        }

        .valor{
            font-size:4rem;
            font-weight:bold;
            color:#ffe66d;
        }

        .lux{
            color:#ddd;
            font-size:22px;
        }

        .texto{
            color:#c6d9c8;
            font-size:20px;
        }

        #mensagem{
            background:#244a2d;
            color:white;
            border:none;
            margin-top:20px;
            font-size:18px;
        }

        .barra{
            height:18px;
            border-radius:20px;
            background:#244a2d;
            overflow:hidden;
            margin-top:20px;
        }

        .barra div{
            width:0%;
            height:100%;
            background:linear-gradient(90deg,#ffee58,#fbc02d);
            transition:.5s;
        }
    </style>

</head>

<body>

    <div class="topo">

        <div class="container">

            <div class="row align-items-center">

                <div class="col-md-8">

                    <div class="titulo">
                        🌱 GreenTech Solutions
                    </div>

                    <div class="subtitulo">
                        Dashboard IoT • Sensor de Luminosidade
                    </div>

                </div>

                <div class="col-md-4 status-box">

                    <h5 id="status" class="badge bg-secondary">
                        Desconectado
                    </h5>

                    <div id="hora">
                        --
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="container painel">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card card-dashboard">

                    <div class="card-body text-center p-5">

                        <div class="icone">
                            ☀️
                        </div>

                        <div id="valorLux" class="valor">
                            --
                        </div>

                        <div class="lux">
                            LUX
                        </div>

                        <div class="texto">
                            Luminosidade da Horta
                        </div>

                        <div class="barra">
                            <div id="barraLux"></div>
                        </div>

                        <div id="mensagem" class="alert">
                            Nenhuma mensagem recebida
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
